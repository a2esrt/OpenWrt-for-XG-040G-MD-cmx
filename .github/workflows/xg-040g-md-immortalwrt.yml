name: Build_XG_040G_MD-ImmortalWrt

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      log_switch:
        description: "开启详细日志"
        required: false
        default: false
        type: boolean

env:
  CONFIG_FILE: "config/xg-040g-md.config"
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
          TZ: ${{ env.TZ }}
        run: |
          sudo apt update
          sudo apt purge -y python3-distutils || true
          sudo apt autoremove -y
          sudo apt install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev file wget \
            squashfs-tools mkbootimg device-tree-compiler
          
          if [[ -n "$TZ" ]]; then
            sudo timedatectl set-timezone "$TZ"
          fi

      - name: Ensure Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install Unidecode

      - name: Clone OpenWrt source code & Apply Patches
        run: |
          git clone --depth 1 --branch "$REPO_BRANCH" "$REPO_URL" openwrt
          
          # --- 1. 应用基础设备补丁 ---
          [ -e patch/02_network ] && cp -f patch/02_network openwrt/target/linux/airoha/an7581/base-files/etc/board.d/02_network
          [ -e patch/an7581.mk ] && cp -f patch/an7581.mk openwrt/target/linux/airoha/image/an7581.mk
          [ -e patch/an7581-bell_xg-040g-md.dts ] && cp -f patch/an7581-bell_xg-040g-md.dts openwrt/target/linux/airoha/dts/an7581-bell_xg-040g-md.dts
          [ -e patch/an7581-nowifi.dtsi ] && cp -f patch/an7581-nowifi.dtsi openwrt/target/linux/airoha/dts/an7581-nowifi.dtsi
          [ -e patch/an7581.dtsi ] && cp -f patch/an7581.dtsi openwrt/target/linux/airoha/dts/an7581.dtsi
          [ -e patch/target.mk ] && cp -f patch/target.mk openwrt/target/linux/airoha/an7581/target.mk
          [ -e patch/config-6.12 ] && cp -f patch/config-6.12 openwrt/target/linux/airoha/an7581/config-6.12
          [ -e patch/netdevices.mk ] && cp -f patch/netdevices.mk openwrt/package/kernel/linux/modules/netdevices.mk
          
          # 🚀 兼容性修复：强制关闭音频驱动防卡死
          echo "CONFIG_SND_SOC_AN7581_WM8960=n" >> openwrt/target/linux/airoha/an7581/config-6.12
          
          # 🚀 超频与电源域补丁
          mkdir -p openwrt/target/linux/airoha/patches-6.12
          [ -e patch/039-v6.14-cpufreq-airoha-Add-EN7581-CPUFreq-SMCCC-driver.patch ] && cp -f patch/039-v6.14-cpufreq-airoha-Add-EN7581-CPUFreq-SMCCC-driver.patch openwrt/target/linux/airoha/patches-6.12/
          [ -e patch/040-v6.14-pmdomain-airoha-Add-Airoha-CPU-PM-Domain-support.patch ] && cp -f patch/040-v6.14-pmdomain-airoha-Add-Airoha-CPU-PM-Domain-support.patch openwrt/target/linux/airoha/patches-6.12/
          
          # --- 2. 🚀 动态生成 FM25G02B 闪存补丁 (完美避开格式问题) ---
          mkdir -p openwrt/target/linux/generic/hack-6.12/
          cat << 'EOF' | sed 's/^_$/ /' > openwrt/target/linux/generic/hack-6.12/999-fm25g02b-simple.patch
          --- a/drivers/mtd/nand/spi/fmsh.c
          +++ b/drivers/mtd/nand/spi/fmsh.c
          @@ -108,6 +108,35 @@ static int fm25g0xd_ecc_get_status(struct spinand_device *spinand,
           		return -EBADMSG;
           }
          _
          +/* --- FM25G02B OOB --- */
          +static int fm25g02b_ooblayout_ecc(struct mtd_info *mtd, int section,
          +				  struct mtd_oob_region *region)
          +{
          +	if (section >= 4)
          +		return -ERANGE;
          +	region->offset = 64 + section * 16;
          +	region->length = 16;
          +	return 0;
          +}
          +
          +static int fm25g02b_ooblayout_free(struct mtd_info *mtd, int section,
          +				   struct mtd_oob_region *region)
          +{
          +	if (section)
          +		return -ERANGE;
          +	region->offset = 2;
          +	region->length = 62;
          +	return 0;
          +}
          +
          +static const struct mtd_ooblayout_ops fm25g02b_ooblayout = {
          +	.ecc = fm25g02b_ooblayout_ecc,
          +	.rfree = fm25g02b_ooblayout_free,
          +};
          _
           static const struct spinand_info fmsh_spinand_table[] = {
           	SPINAND_INFO("FM25S01A",
           		     SPINAND_ID(SPINAND_READID_METHOD_OPCODE_DUMMY, 0xE4),
          @@ -148,6 +177,15 @@ static const struct spinand_info fmsh_spinand_table[] = {
           					      &update_cache_variants),
           		     SPINAND_HAS_QE_BIT,
           		     SPINAND_ECCINFO(&fm25s01_ooblayout, fm25s01bi3_ecc_ecc_get_status)),
          +	SPINAND_INFO("FM25G02B",
          +		     SPINAND_ID(SPINAND_READID_METHOD_OPCODE_DUMMY, 0xD2),
          +		     NAND_MEMORG(1, 2048, 128, 64, 2048, 40, 1, 1, 1),
          +		     NAND_ECCREQ(8, 512),
          +		     SPINAND_INFO_OP_VARIANTS(&read_cache_variants,
          +					      &write_cache_variants,
          +					      &update_cache_variants),
          +		     SPINAND_HAS_QE_BIT,
          +		     SPINAND_ECCINFO(&fm25g02b_ooblayout, NULL)),
           	SPINAND_INFO("FM25G02D",
           		     SPINAND_ID(SPINAND_READID_METHOD_OPCODE_DUMMY, 0xF2),
          EOF
          echo "✅ 已动态生成 FM25G02B 补丁，彻底防报错！"

          # --- 3. 下载常规第三方插件 ---
          git clone https://github.com/sirpdboy/luci-app-eqosplus openwrt/package/luci-app-eqosplus
          git clone https://github.com/rchen14b/luci-app-airoha-npu openwrt/package/luci-app-airoha-npu

      - name: Update & Install feeds
        working-directory: ./openwrt
        run: |
          if [ -e ../$FEEDS_CONF ]; then
            cp -f ../$FEEDS_CONF ./feeds.conf.default
          fi
          ./scripts/feeds update -a
          ./scripts/feeds install -a -f

      - name: Hotfix LuCI & Third-party Packages
        working-directory: ./openwrt
        run: |
          # 1. 修复 LuCI cbi.js 报错
          CBI_JS="feeds/luci/modules/luci-base/htdocs/luci-static/resources/cbi.js"
          if [ -f "$CBI_JS" ]; then
            sed -i -E "s@return[[:space:]]*''\\.format\\.apply\\(arguments\\[0\\],[[:space:]]*a\\);@return String.prototype.format.apply(arguments[0], a.slice(1));@g" "$CBI_JS"
            sed -i -E "s@return[[:space:]]*''\\.nobr\\.apply\\(arguments\\[0\\],[[:space:]]*a\\);@return String.prototype.nobr.apply(arguments[0], a.slice(1));@g" "$CBI_JS"
            sed -i -E "s@for\\(let a of depends\\)@for(let i=0;i<depends.length;i++)@g" "$CBI_JS"
            sed -i -E "s@cbi_d_add\\(n,depends\\[a\\],index\\);@cbi_d_add(n,depends[i],index);@g" "$CBI_JS"
          fi

          # 2. 强力清除冲突的 Sing-box 和旧版代理包
          rm -rf feeds/packages/net/sing-box
          rm -rf package/feeds/packages/sing-box
          rm -rf feeds/luci/applications/luci-app-passwall
          rm -rf feeds/luci/applications/luci-app-homeproxy

          # 3. 拉取最新的 HomeProxy
          git clone --depth=1 https://github.com/immortalwrt/homeproxy.git package/homeproxy

          # 4. 拉取 PassWall 1 及其完整依赖
          git clone --depth=1 -b main https://github.com/Openwrt-Passwall/openwrt-passwall.git package/passwall_repo
          cp -rf package/passwall_repo/luci-app-passwall package/luci-app-passwall
          rm -rf package/passwall_repo
          
          git clone --depth=1 -b main https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/passwall-packages
          for pkg in package/passwall-packages/*/; do
            if [ -d "$pkg" ] && [ -f "$pkg/Makefile" ]; then
              cp -rf "$pkg" package/
            fi
          done
          rm -rf package/passwall-packages

          # 5. PassWall Lua 空指针修复补丁
          PW_LUA="package/luci-app-passwall/luasrc/model/cbi/passwall/client/global.lua"
          if [ -f "$PW_LUA" ]; then
            sed -i 's#local dns_shunt_val = s.fields\["dns_shunt"\]:formvalue(section)#local dns_shunt_val = (s.fields["dns_shunt"] and s.fields["dns_shunt"]:formvalue(section)) or ""#g' "$PW_LUA"
            sed -i 's#s.fields\["dns_mode"\]:formvalue(section) == "xray" or s.fields\["smartdns_dns_mode"\]:formvalue(section) == "xray"#((s.fields["dns_mode"] and s.fields["dns_mode"]:formvalue(section)) == "xray") or ((s.fields["smartdns_dns_mode"] and s.fields["smartdns_dns_mode"]:formvalue(section)) == "xray")#g' "$PW_LUA"
            sed -i 's#s.fields\["dns_mode"\]:formvalue(section) == "sing-box" or s.fields\["smartdns_dns_mode"\]:formvalue(section) == "sing-box"#((s.fields["dns_mode"] and s.fields["dns_mode"]:formvalue(section)) == "sing-box") or ((s.fields["smartdns_dns_mode"] and s.fields["smartdns_dns_mode"]:formvalue(section)) == "sing-box")#g' "$PW_LUA"
          fi

      - name: Copy configuration and defconfig
        run: |
          cp -fv "${CONFIG_FILE}" openwrt/.config
          
          # 🚀 强制写入 NPU 插件开启指令
          echo "CONFIG_PACKAGE_luci-app-airoha-npu=y" >> openwrt/.config
          
          cd openwrt && make defconfig
          [ -e .config ] && cp .config defconfig-final.config

      - name: Upload build config files
        uses: actions/upload-artifact@v4
        with:
          name: build-config
          path: |
            config/xg-040g-md.config
            openwrt/defconfig-final.config
            openwrt/feeds.conf.default

      - name: Download packages
        working-directory: ./openwrt
        run: |
          make download -j4 V=s
          find dl -size -1024c -delete

      - name: Compile OpenWrt firmware
        id: compile
        run: |
          cd openwrt
          echo "Starting Compile..."
          if [[ "${{ inputs.log_switch }}" == "true" ]]; then
            make -j1 V=s
          else
            make -j$(nproc)
          fi
          
          DEVICE_NAME=$(grep -o 'CONFIG_TARGET.*DEVICE_[^=]*=y' .config | head -1 | sed 's/.*DEVICE_\(.*\)=y/\1/')
          if [[ -n "$DEVICE_NAME" ]]; then
            echo "DEVICE_NAME=_${DEVICE_NAME}" >> $GITHUB_ENV
          fi
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare firmware artifacts path
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: env.UPLOAD_FIRMWARE == 'true'
        with:
          name: ImmortalWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}/*

      - name: Generate release tag and notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat <<EOF > release.txt
          🚀 ImmortalWrt firmware for XG-040G-MD
          ----------------------
          构建时间: $(date +"%Y-%m-%d %H:%M")
          内核: ImmortalWrt Master (已打 1.6GHz 超频补丁)
          代理: 纯正 Passwall 1 + HomeProxy 满血双持
          特性: 包含 NPU 硬件监控面板 & EQoS Plus
          修复: FM25G02B 闪存完美适配 & 2.5G 网口满血修复
          EOF

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        if: env.UPLOAD_RELEASE == 'true'
        with:
          tag: ${{ steps.tag.outputs.release_tag }}
          bodyFile: release.txt
          artifacts: |
            ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 7
          keep_minimum_runs: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
